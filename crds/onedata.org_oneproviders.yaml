---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: oneproviders.onedata.org
spec:
  group: onedata.org
  names:
    kind: Oneprovider
    listKind: OneproviderList
    plural: oneproviders
    singular: oneprovider
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.domain
      name: Domain
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.registered
      name: Registered
      type: boolean
    - jsonPath: .status.providerId
      name: ProviderID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Oneprovider is the Schema for the oneproviders API.

          v0.6.5+ compatibility note: this operator version deletes several
          operator-side heals whose core defects are now fixed upstream in the
          project's own patched core images (deliverables/core-fix-ledger.md) --
          the clock-sync-kick heal (core patch 0016-B), the F12 stale-host health
          bypass (core patch 0014), and the workerOverlayConfig oz_domain
          emission (core patch 0017). On STOCK Onedata images (not the project's
          Harbor dev-tagged patched snapshots), these deleted heals have NO core
          replacement -- affected symptoms (permanent clock-sync stall after a
          virgin-panel heal, opaque 500s on a stale host-registry entry, stalled
          op_worker Graph Sync after an identity-adopt heal) will reappear.
          Capability detection (an UnsupportedCoreImage condition on stock cores)
          is a hard gate before any public release; until then, v0.6.5+ is only
          supported against the project's own patched images.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Oneprovider
            properties:
              adminEmail:
                description: |-
                  adminEmail is the contact address for the Oneprovider
                  administrator, surfaced to Onezone users.
                pattern: ^[^@\s]+@[^@\s]+\.[^@\s]+$
                type: string
              domain:
                description: |-
                  domain is the fully qualified, externally advertised domain name
                  under which this Oneprovider is exposed, unless subdomainDelegation
                  is enabled. It stays the advertised-domain concept only -- it is
                  never inferred to also be the in-cluster Erlang node hostname (see
                  managed's node-FQDN derivation in internal/controller for that).
                minLength: 1
                pattern: ^([a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$
                type: string
              geo:
                description: geo is the geographical location advertised for this
                  Oneprovider.
                properties:
                  latitude:
                    description: latitude in decimal degrees, in the range [-90, 90]
                      (e.g. "52.2297").
                    pattern: ^-?(90(\.0+)?|[0-8]?[0-9](\.[0-9]+)?)$
                    type: string
                  longitude:
                    description: |-
                      longitude in decimal degrees, in the range [-180, 180]
                      (e.g. "21.0122").
                    pattern: ^-?(180(\.0+)?|1[0-7][0-9](\.[0-9]+)?|[0-9]?[0-9](\.[0-9]+)?)$
                    type: string
                required:
                - latitude
                - longitude
                type: object
              managed:
                description: |-
                  managed, when set with enabled=true, has the operator deploy and
                  drive this Oneprovider's workload itself (chart-wrap
                  deploy-orchestration, design §5.16) instead of reconciling against
                  an already-deployed onepanel referenced via onepanelEndpoint.
                  Mutually exclusive with onepanelEndpoint -- see ManagedDeployment's
                  doc comment.
                properties:
                  enabled:
                    default: false
                    description: |-
                      enabled turns on the operator's own deploy-orchestration for this
                      Oneprovider: the operator installs and drives the workload itself
                      rather than expecting one to already exist at onepanelEndpoint.
                    type: boolean
                  ephemeralStorageLimit:
                    description: |-
                      ephemeralStorageLimit overrides the vendored chart's
                      ephemeralStorageLimit value (default "10Gi") for this component's
                      main container. Sized, by default, well under the smallest
                      observed node flavor's ~24Gi capacity so that a runaway pod --
                      e.g. rtransfer_link's historical core-side crash-loop (Finding 11,
                      since fixed by the commonName fix, see TLSConfig.TrustIssuerCA's
                      doc comment in api/v1alpha1/common_types.go; this limit remains a
                      general anti-cascade defense against ANY runaway crash-loop in this
                      container, not specific to that now-fixed defect), which at the
                      time dumped ~2.5-3GB/min of uncleaned core files into this exact
                      container's writable layer -- hits ITS OWN container limit and
                      gets evicted alone, long before the flood could tip the whole node
                      into DiskPressure. See EphemeralStorageRequest's doc comment for
                      the full incident evidence this pair of fields responds to.
                    type: string
                  ephemeralStorageRequest:
                    description: |-
                      ephemeralStorageRequest overrides the vendored chart's
                      ephemeralStorageRequest value (default "2Gi") for this component's
                      main container -- the k8s scheduler's placement signal for its
                      local/writable-layer disk footprint. If empty, the chart's own
                      default is used.

                      v0.6.2 hardening (design campaign; research/gitops-v2-deploy.md +
                      research/rtransfer-cafix.md, phase4/livegrow-hardware.md Finding
                      11): before this field existed, NO ephemeral-storage request/limit
                      was set at all on this container, anywhere -- a live incident on
                      k8s-one measured a single oneprovider container's writable-layer
                      footprint at ~21GiB (21983968Ki, databaseMode: Bundled, no
                      dedicated DB PVC) before tripping node-level DiskPressure on a
                      ~24GiB-capacity node, and the eviction cascade took out EVERY
                      StatefulSet replica at once, wiping the un-persisted Bundled
                      Couchbase state and forcing a virgin re-bootstrap under a new
                      provider identity. A request gives the scheduler real placement
                      visibility (so it does not co-locate multiple such pods on one
                      small node); the accompanying ephemeralStorageLimit
                      (EphemeralStorageLimit below) bounds a single runaway pod's blast
                      radius instead of letting it take the whole node down.

                      The chart-level default (2Gi request / 10Gi limit) is deliberately
                      modest -- NOT sized to the ~21-22Gi failure-case working set this
                      incident's own evidence doc recommends for genuine anti-cascade
                      scheduling protection -- so a single-node minikube/dev cluster
                      (typically far below 21Gi of schedulable ephemeral-storage per
                      node) can still schedule this pod at all. A production/hardware
                      landscape sharing a node pool with other landscapes SHOULD set
                      this field explicitly, upward toward the measured working set
                      (e.g. "20Gi"), to get real scheduler anti-co-location protection.
                    type: string
                  image:
                    description: |-
                      image overrides the oneprovider chart's default container image
                      (e.g. "docker.onedata.org/oneprovider:21.02.7"). If empty, the
                      chart's own default is used.
                    type: string
                  imagePullSecrets:
                    description: |-
                      imagePullSecrets lists the names of Secrets (in the same namespace)
                      holding registry credentials the vendored chart's pods should use to
                      pull their images (e.g. docker.onedata.org/*-dev images, served from
                      a private registry). Plumbed into the chart's global.imagePullSecrets
                      value, which the onedata-chart-utils "imagePullSecrets" helper
                      renders onto every pod template it is included in. Empty (the
                      default) omits imagePullSecrets entirely, matching the chart's own
                      unset-global behavior.
                    items:
                      type: string
                    type: array
                  releaseNameOverride:
                    description: |-
                      releaseNameOverride optionally overrides the release-name component
                      of the chart's resource names, without changing the actual Helm
                      release name (which stays the CR's metadata.name and must remain
                      unique per namespace). It maps to the vendored charts'
                      global.releaseNameOverride value, which their shared
                      onedata-chart-utils "releaseName"/"fullname" helpers consult:
                      fullname = "<releaseNameOverride|release>-<chart>-<suffix>",
                      trimmed of a trailing "-".

                      This exists for naming parity with one-env's onedata-3p meta-chart
                      deployments (which install every component under one release,
                      typically "dev", yielding resource names like "dev-onezone" and
                      "dev-oneprovider-krakow") so that operator-provisioned environments
                      can reproduce the exact in-cluster DNS names Onedata's own CT
                      suites derive their expectations from. Empty (the default)
                      preserves the existing "<release>-<chart>" naming.
                    type: string
                  storageClass:
                    description: |-
                      storageClass optionally selects a StorageClass for persistent
                      storage backing this Oneprovider's data volume.

                      KNOWN LIMITATION: the vendored oneprovider chart's posix
                      PersistentVolumeClaim template hardcodes storageClassName="none"
                      (see charts/oneprovider/templates/posix-pv-pvc.yaml) and does not
                      currently plumb a values override through to it. Setting this field
                      today only enables persistence (posix.persistence.enabled=true);
                      the class name itself is not yet wired to the chart and is silently
                      ignored beyond that. Flagged here rather than pretending it works
                      end-to-end; fixing this requires a chart change, tracked as
                      follow-up tech debt.

                      DATA-LOSS WARNING (design it.105/130/154-P4): this ManagedDeployment
                      type is shared by both Oneprovider and Onezone (see this field's
                      doc comment above); the note below applies to BOTH, with an extra
                      twist for Oneprovider specifically. Leaving this field unset -- the
                      default, and the only option before this field existed -- makes
                      EnablePersistence false (internal/deploy/values.go), which makes
                      onepanel's own /volumes/persistence state volume EPHEMERAL for
                      EITHER CR type: its contents are lost on every pod
                      restart/recreate. For a managed ONEPROVIDER specifically, the SAME
                      boolean also drives the chart's always-provisioned posix
                      user-DATA backend's persistence (posix.persistence.enabled in the
                      vendored chart's own values.yaml -- a separate value there, just
                      not yet separately exposed by this single Go field) -- so an
                      Oneprovider left with this field unset loses actual user files on
                      every pod restart/recreate, not merely internal state. (For
                      Composed/external-Couchbase Oneprovider topologies, the database
                      PVC is a third, ALREADY independently configurable concern --
                      CouchbaseInput.StorageClass.) Splitting the onepanel-state concern
                      from the posix-user-data concern at the CRD level is deliberately
                      deferred (a schema decision warranting its own design pass, not a
                      drive-by field addition) -- what exists today instead is a loud,
                      non-blocking guard, currently wired for the Oneprovider path only
                      (where the risk is user data, not just internal state): a managed
                      Oneprovider left with this field unset carries a
                      PosixDataEphemeral=True status Condition plus a one-shot Warning
                      Event (internal/controller/oneprovider_posix_guard.go), so the risk
                      is visible rather than silently discovered later, per this repo's
                      it.100/104 no-silent-workaround discipline applied to our own
                      defaults.
                    type: string
                  storageVolume:
                    description: |-
                      storageVolume optionally supplies the volume that backs a managed
                      Oneprovider's op_worker posix storage path (/volumes/posix)
                      directly, mounted IDENTICALLY across ALL worker pods -- no
                      per-pod subPathExpr, unlike the storageClass-governed built-in
                      posix PVC (see StorageClass's own doc comment above for why that
                      PVC is structurally single-worker: default ReadWriteOnce, plus a
                      $(POD_NAME)-scoped subPath even if forced to ReadWriteMany). Use
                      this field for the multi-worker production pattern: a
                      pre-existing RWX PersistentVolumeClaim (by name), a CSI inline
                      volume (e.g. nfs.csi.k8s.io), or a cluster-wide hostPath
                      (Lustre/GPFS mounted at the same path on every k8s node).
                      corev1.VolumeSource's own union expresses all of these (and every
                      other k8s volume kind) in one field, deliberately -- scientists
                      mount all manner of shared filesystems as posix, and this
                      operator should not need a schema change for each one (design
                      it.158-162; research/posix-storage-topology.md).

                      The operator mounts this verbatim via the vendored oneprovider
                      chart's existing "external-volumes"/"external-volume-mounts"
                      passthroughs (templates/deployment.yaml, the pod's volumes: list
                      and the oneprovider container's volumeMounts: respectively) and
                      does NOT introspect it -- it largely cannot: a hostPath (and many
                      CSI inline volumes) carries no PersistentVolumeClaim, no access
                      mode, no CSI driver metadata that would let k8s (or this
                      operator) distinguish a cluster-wide-shared mount from
                      node-local scratch; the two produce byte-identical volume specs.
                      The caller is responsible for guaranteeing the backing is
                      actually shared (RWX) and durable across every worker node; see
                      oneprovider_posix_guard.go's guard-v2 for the non-blocking,
                      always-on breadcrumb this repo emits instead of pretending to
                      verify what it cannot.

                      Setting this field disables the chart's own built-in per-pod
                      posix PVC (posix.persistence.enabled=false) regardless of
                      StorageClass -- the two are mutually exclusive backings for the
                      same mount path, and this field always wins when both are set
                      (avoids a double-mount at /volumes/posix). Onepanel's own
                      /volumes/persistence state volume is UNAFFECTED by this field --
                      still governed solely by StorageClass, per that field's own doc
                      comment.

                      nil (the default) preserves today's behavior exactly: a
                      single-worker StorageClass-governed posix PVC, or an ephemeral
                      emptyDir-equivalent volume if StorageClass is also unset.

                      NOTE (shared-struct caveat): ManagedDeployment is shared by both
                      the Oneprovider and Onezone CRDs (see StorageClass's own doc
                      comment for the identical caveat). This field is consumed by
                      BuildOneproviderValues for the Oneprovider path ONLY --
                      BuildOnezoneValues ignores it, since a managed Onezone has no
                      posix user-data backend of its own to redirect. The field still
                      appears on the Onezone CRD's schema (the struct is shared) but is
                      a no-op there.
                    properties:
                      awsElasticBlockStore:
                        description: |-
                          awsElasticBlockStore represents an AWS Disk resource that is attached to a
                          kubelet's host machine and then exposed to the pod.
                          Deprecated: AWSElasticBlockStore is deprecated. All operations for the in-tree
                          awsElasticBlockStore type are redirected to the ebs.csi.aws.com CSI driver.
                          More info: https://kubernetes.io/docs/concepts/storage/volumes#awselasticblockstore
                        properties:
                          fsType:
                            description: |-
                              fsType is the filesystem type of the volume that you want to mount.
                              Tip: Ensure that the filesystem type is supported by the host operating system.
                              Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
                              More info: https://kubernetes.io/docs/concepts/storage/volumes#awselasticblockstore
                            type: string
                          partition:
                            description: |-
                              partition is the partition in the volume that you want to mount.
                              If omitted, the default is to mount by volume name.
                              Examples: For volume /dev/sda1, you specify the partition as "1".
                              Similarly, the volume partition for /dev/sda is "0" (or you can leave the property empty).
                            format: int32
                            type: integer
                          readOnly:
                            description: |-
                              readOnly value true will force the readOnly setting in VolumeMounts.
                              More info: https://kubernetes.io/docs/concepts/storage/volumes#awselasticblockstore
                            type: boolean
                          volumeID:
                            description: |-
                              volumeID is unique ID of the persistent disk resource in AWS (Amazon EBS volume).
                              More info: https://kubernetes.io/docs/concepts/storage/volumes#awselasticblockstore
                            type: string
                        required:
                        - volumeID
                        type: object
                      azureDisk:
                        description: |-
                          azureDisk represents an Azure Data Disk mount on the host and bind mount to the pod.
                          Deprecated: AzureDisk is deprecated. All operations for the in-tree azureDisk type
                          are redirected to the disk.csi.azure.com CSI driver.
                        properties:
                          cachingMode:
                            description: 'cachingMode is the Host Caching mode: None,
                              Read Only, Read Write.'
                            type: string
                          diskName:
                            description: diskName is the Name of the data disk in
                              the blob storage
                            type: string
                          diskURI:
                            description: diskURI is the URI of data disk in the blob
                              storage
                            type: string
                          fsType:
                            default: ext4
                            description: |-
                              fsType is Filesystem type to mount.
                              Must be a filesystem type supported by the host operating system.
                              Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
                            type: string
                          kind:
                            description: 'kind expected values are Shared: multiple
                              blob disks per storage account  Dedicated: single blob
                              disk per storage account  Managed: azure managed data
                              disk (only in managed availability set). defaults to
                              shared'
                            type: string
                          readOnly:
                            default: false
                            description: |-
                              readOnly Defaults to false (read/write). ReadOnly here will force
                              the ReadOnly setting in VolumeMounts.
                            type: boolean
                        required:
                        - diskName
                        - diskURI
                        type: object
                      azureFile:
                        description: |-
                          azureFile represents an Azure File Service mount on the host and bind mount to the pod.
                          Deprecated: AzureFile is deprecated. All operations for the in-tree azureFile type
                          are redirected to the file.csi.azure.com CSI driver.
                        properties:
                          readOnly:
                            description: |-
                              readOnly defaults to false (read/write). ReadOnly here will force
                              the ReadOnly setting in VolumeMounts.
                            type: boolean
                          secretName:
                            description: secretName is the  name of secret that contains
                              Azure Storage Account Name and Key
                            type: string
                          shareName:
                            description: shareName is the azure share Name
                            type: string
                        required:
                        - secretName
                        - shareName
                        type: object
                      cephfs:
                        description: |-
                          cephFS represents a Ceph FS mount on the host that shares a pod's lifetime.
                          Deprecated: CephFS is deprecated and the in-tree cephfs type is no longer supported.
                        properties:
                          monitors:
                            description: |-
                              monitors is Required: Monitors is a collection of Ceph monitors
                              More info: https://examples.k8s.io/volumes/cephfs/README.md#how-to-use-it
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: atomic
                          path:
                            description: 'path is Optional: Used as the mounted root,
                              rather than the full Ceph tree, default is /'
                            type: string
                          readOnly:
                            description: |-
                              readOnly is Optional: Defaults to false (read/write). ReadOnly here will force
                              the ReadOnly setting in VolumeMounts.
                              More info: https://examples.k8s.io/volumes/cephfs/README.md#how-to-use-it
                            type: boolean
                          secretFile:
                            description: |-
                              secretFile is Optional: SecretFile is the path to key ring for User, default is /etc/ceph/user.secret
                              More info: https://examples.k8s.io/volumes/cephfs/README.md#how-to-use-it
                            type: string
                          secretRef:
                            description: |-
                              secretRef is Optional: SecretRef is reference to the authentication secret for User, default is empty.
                              More info: https://examples.k8s.io/volumes/cephfs/README.md#how-to-use-it
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                          user:
                            description: |-
                              user is optional: User is the rados user name, default is admin
                              More info: https://examples.k8s.io/volumes/cephfs/README.md#how-to-use-it
                            type: string
                        required:
                        - monitors
                        type: object
                      cinder:
                        description: |-
                          cinder represents a cinder volume attached and mounted on kubelets host machine.
                          Deprecated: Cinder is deprecated. All operations for the in-tree cinder type
                          are redirected to the cinder.csi.openstack.org CSI driver.
                          More info: https://examples.k8s.io/mysql-cinder-pd/README.md
                        properties:
                          fsType:
                            description: |-
                              fsType is the filesystem type to mount.
                              Must be a filesystem type supported by the host operating system.
                              Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
                              More info: https://examples.k8s.io/mysql-cinder-pd/README.md
                            type: string
                          readOnly:
                            description: |-
                              readOnly defaults to false (read/write). ReadOnly here will force
                              the ReadOnly setting in VolumeMounts.
                              More info: https://examples.k8s.io/mysql-cinder-pd/README.md
                            type: boolean
                          secretRef:
                            description: |-
                              secretRef is optional: points to a secret object containing parameters used to connect
                              to OpenStack.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                          volumeID:
                            description: |-
                              volumeID used to identify the volume in cinder.
                              More info: https://examples.k8s.io/mysql-cinder-pd/README.md
                            type: string
                        required:
                        - volumeID
                        type: object
                      configMap:
                        description: configMap represents a configMap that should
                          populate this volume
                        properties:
                          defaultMode:
                            description: |-
                              defaultMode is optional: mode bits used to set permissions on created files by default.
                              Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
                              YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
                              Defaults to 0644.
                              Directories within the path are not affected by this setting.
                              This might be in conflict with other options that affect the file
                              mode, like fsGroup, and the result can be other mode bits set.
                            format: int32
                            type: integer
                          items:
                            description: |-
                              items if unspecified, each key-value pair in the Data field of the referenced
                              ConfigMap will be projected into the volume as a file whose name is the
                              key and content is the value. If specified, the listed keys will be
                              projected into the specified paths, and unlisted keys will not be
                              present. If a key is specified which is not present in the ConfigMap,
                              the volume setup will error unless it is marked optional. Paths must be
                              relative and may not contain the '..' path or start with '..'.
                            items:
                              description: Maps a string key to a path within a volume.
                              properties:
                                key:
                                  description: key is the key to project.
                                  type: string
                                mode:
                                  description: |-
                                    mode is Optional: mode bits used to set permissions on this file.
                                    Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
                                    YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
                                    If not specified, the volume defaultMode will be used.
                                    This might be in conflict with other options that affect the file
                                    mode, like fsGroup, and the result can be other mode bits set.
                                  format: int32
                                  type: integer
                                path:
                                  description: |-
                                    path is the relative path of the file to map the key to.
                                    May not be an absolute path.
                                    May not contain the path element '..'.
                                    May not start with the string '..'.
                                  type: string
                              required:
                              - key
                              - path
                              type: object
                            type: array
                            x-kubernetes-list-type: atomic
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: optional specify whether the ConfigMap or
                              its keys must be defined
                            type: boolean
                        type: object
                        x-kubernetes-map-type: atomic
                      csi:
                        description: csi (Container Storage Interface) represents
                          ephemeral storage that is handled by certain external CSI
                          drivers.
                        properties:
                          driver:
                            description: |-
                              driver is the name of the CSI driver that handles this volume.
                              Consult with your admin for the correct name as registered in the cluster.
                            type: string
                          fsType:
                            description: |-
                              fsType to mount. Ex. "ext4", "xfs", "ntfs".
                              If not provided, the empty value is passed to the associated CSI driver
                              which will determine the default filesystem to apply.
                            type: string
                          nodePublishSecretRef:
                            description: |-
                              nodePublishSecretRef is a reference to the secret object containing
                              sensitive information to pass to the CSI driver to complete the CSI
                              NodePublishVolume and NodeUnpublishVolume calls.
                              This field is optional, and  may be empty if no secret is required. If the
                              secret object contains more than one secret, all secret references are passed.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
