                  workerLiveGrowStartedAt is when reconcileWorkerLiveGrow last drove
                  the provisioning RPCs (configure_additional_node/
                  import_provider_auth_file/EXPECTED_NODES) + the host-scoped
                  PATCH /provider/workers/:host start for WorkerLiveGrowHost -- the
                  clock LiveGrowStalled's deadline (deploy.LiveGrowJoinTimeout) is
                  measured against. Cleared alongside WorkerLiveGrowHost once the host
                  reports healthy or the attempt is abandoned.
                format: date-time
                type: string
              workerScaleUpTaskId:
                description: |-
                  workerScaleUpTaskId is the onepanel task id (from add_provider_workers'
                  202 response) currently being tracked for a managed workerNodes
                  INCREASE (design it.166, closing it.163/154-P1's gap). Set by
                  reconcileWorkerScaleUp's driveAddNodes and polled by pollAddNodesTask
                  (see oneprovider_scaleup.go) until onepanel's own GET /provider/workers
                  reports every desired worker host as known -- the terminal Ready
                  transition is decided from THAT live re-check, not from this task's
                  status alone (mirrors DeployTaskID/pollDeployTask's own "task done !=
                  safe to declare done" judgment call). On a task failure this is
                  deliberately left set (mirrors DeployTaskID's identical choice) so a
                  human can inspect/clear it; the operator does not auto-retry a failed
                  cold scale-up. Meaningless outside managed mode with
                  spec.managed.topology set.
                type: string
            type: object
