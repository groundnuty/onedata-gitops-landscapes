                      bringing your own certificate via secretRef alone; if both are set,
                      the issued certificate is stored in secretRef.
                    properties:
                      group:
                        default: cert-manager.io
                        description: group of the issuer's API, e.g. "cert-manager.io".
                        type: string
                      kind:
                        default: Issuer
                        description: kind of the issuer, e.g. "Issuer" or "ClusterIssuer".
                        enum:
                        - Issuer
                        - ClusterIssuer
                        type: string
                      name:
                        description: |-
                          name of the Issuer or ClusterIssuer to use when requesting a
                          certificate.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  secretRef:
                    description: |-
                      secretRef names the Secret (in the same namespace) holding the
                      tls.crt/tls.key pair to serve. If issuerRef is set and the secret
                      does not yet exist, it is created once the certificate is issued.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  trustIssuerCA:
                    description: |-
                      trustIssuerCA mounts the issued certificate Secret's ca.crt into
                      every component's trusted-CA directory (cacerts_dir) -- set this
                      when issuerRef points at a CA or SelfSigned issuer, whose Secrets
                      carry ca.crt (a development CA is the common case). Leave false
                      (the default) for ACME/public issuers such as Let's Encrypt: their
                      Secrets carry no ca.crt, and their roots are already present in
                      every component's public trust store, so no extra mount is needed.
                      Design it.194/195/196 (research/dev-ca-trust-design.md) -- this
                      closes the trust-distribution gap that a public-ACME landscape
                      never needed: a private CA's leaf certs are served (issuerRef
                      alone is already sufficient for that), but with this left unset no
                      peer trusts them, so provider<->zone GraphSync, inter-provider
                      rtransfer, and oneclient all fail their TLS handshake even though
                      the certificate itself issued cleanly.

                      Requires operator >=v0.6.4 and a leaf certificate carrying a
                      non-empty commonName (Finding 11; research/f11-mechanism-matrix.md,
                      research/cn-fix.md): rtransfer_link's embedded Fizz/Wangle TLS stack
                      throws std::runtime_error("empty identity") when the identity/leaf
                      certificate's X.509 Subject is empty -- a shape cert-manager
                      produces by default for a dnsNames-only (no commonName) Certificate
                      spec. This was originally misdiagnosed as trustIssuerCA/cacerts_dir
                      itself being incompatible (v0.6.2's now-removed
                      TrustIssuerCAIncompatible guard); a live, controlled re-isolation
                      (research/cn-fix.md Arms 0-2) proved the cacerts_dir mount --
                      including the exact orphan-ca.crt shape this field produces -- is
                      NOT independently crash-triggering once the leaf certificate has a
                      real Subject. Since v0.6.4 this operator always sets spec.commonName
                      on every Certificate it emits (setCertificateSpec,
                      internal/controller/certificate.go), so this field is fully
                      supported and produces no known incompatibility: Arm 2 confirmed
                      trustIssuerCA:true + issuerRef clean end-to-end (~12 sustained
                      minutes, 0 crashes, genuine Ready status) against a live
                      cert-manager ClusterIssuer.

                      Onezone was never affected -- oz_worker has no rtransfer subsystem
                      at all (verified: zero references to rtransfer anywhere in
                      oz-worker-int's source tree, vs. 17 in op-worker-int's).
                    type: boolean
                type: object
            required:
            - adminEmail
            - name
            - onezoneRef
            type: object
          status:
            description: status defines the observed state of Oneprovider
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Oneprovider resource.
                  Each condition has a unique type and reflects the status of a
                  specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deployTaskId:
                description: |-
                  deployTaskId is the onepanel task id (from configure_provider's 202
                  response) currently being tracked, or that most recently completed.
                  Set by reconcileConfigure and polled by pollDeployTask (see
                  oneprovider_configure.go) until onepanel's /configuration reports
                  deployed=true; not cleared afterwards, so its presence does not by
                  itself indicate an in-progress deployment -- check phase/deployed
                  status instead. Mirrors OnezoneStatus.DeployTaskID.
                type: string
              identityConflictCandidateId:
                description: |-
                  identityConflictCandidateId, when non-empty, is a providerId that a
                  registration/adopt attempt would have produced but was REFUSED by
                  the operator's identity guard (design it.138/139) because it
                  differs from a providerId this Oneprovider previously recorded in
                  its own registration secret (see
                  OneproviderReconciler.reconcileProviderIdentity,
                  oneprovider_registration.go): rebuilding StorageBackend/Support
                  resources under this id risks permanently orphaning any data still
                  referencing the old one. Cleared automatically the next time a
                  registration/adopt attempt yields either the SAME id as before, or
                  -- once a human resolves the conflict, e.g. by clearing the stale
                  registration secret to accept the new identity -- a candidate the
                  guard no longer objects to.

                  StorageBackendReconciler.reconcileExistingStorage and
                  SupportReconciler.resetSupportForReFeed consult this (via
                  resolveOneproviderIdentityConflict, oneprovider_identity_guard.go)
                  before recreating a resource against this Oneprovider's identity,
                  and refuse to do so while it is set.
                type: string
              managedObservedGeneration:
                description: |-
                  managedObservedGeneration is the .metadata.generation last applied
                  to the managed helm release (spec.managed.enabled=true only): the
                  generation reconcileManagedBootstrap's initial install ran against,
                  or reconcileManagedSpecUpdate's most recent helm upgrade ran
                  against. Compared against the live .metadata.generation on every
                  managed reconcile once bootstrap has completed -- a mismatch means
                  the spec changed since the release was last applied (e.g.
                  spec.managed.image), and the operator re-runs helm
                  install/upgrade rather than silently ignoring the edit forever.
                  Internal/derived: not user-settable, and meaningless outside
                  managed mode.
                format: int64
                type: integer
              managedOnepanelEndpoint:
                description: |-
                  managedOnepanelEndpoint is the operator-derived "host:port" used to
                  reach the onepanel instance the operator itself deployed for this
                  Oneprovider (spec.managed.enabled=true only). It is the pod IP of
                  the release's onepanel pod (the chart's own Service is headless, so
                  there is no ClusterIP to target) -- populated once that pod is
                  Running with an assigned IP, and read thereafter by the same
                  reconcile logic that drive-first Oneproviders use via
                  spec.onepanelEndpoint. Internal/derived: not user-settable, and
                  meaningless outside managed mode.
                type: string
              managedPassphraseBootstrapped:
                description: |-
                  managedPassphraseBootstrapped reports whether the operator has
                  already set the emergency passphrase on the onepanel it deployed
                  for this Oneprovider (spec.managed.enabled=true only). Guards
                  against re-attempting the unauthenticated bootstrap PUT once a
                  passphrase is set (onepanel then requires the *current* passphrase
                  to change it, which this controller does not attempt).
                type: boolean
              managedTopologyShape:
                description: |-
                  managedTopologyShape records the workload-decomposition "shape"
                  (design it.90 realization -- large-dev:/mnt/data/work/phase4/rolesplit.md)
                  this Oneprovider was FIRST successfully bootstrapped with:
                  "PerRoleComposed" (databaseMode Composed + spec.managed.topology
                  set -- per-role worker/cluster_manager StatefulSets) or "Legacy"
                  (Bundled, or Composed with no topology -- the single combined
                  StatefulSet). Set exactly once, at the first successful bootstrap;
                  never updated again by the operator itself.

                  TOPOLOGY SHAPE IS SET AT CREATION AND NEVER MIGRATED IN PLACE
                  (maintainer decision): once this field is non-empty,
                  reconcileTopologyShapeGuard refuses (Degraded,
                  "TopologyShapeChangeRefused") to reconcile any spec edit that would
                  change the computed shape (flipping databaseMode, or adding/
                  removing spec.managed.topology) -- the fix is to redeploy this
                  Oneprovider fresh (delete the CR, recreate with the desired shape;
                  external Couchbase + the existing identity-adopt machinery
                  preserve the provider's identity across that redeploy if the same
                  Composed database is kept), not an in-place operator migration.
                  Topology COUNT changes (workerNodes, managerNodes) are NOT shape
                  changes and remain fully mutable regardless of this field --
                  scaling is native StatefulSet-replica/elasticity-patch territory,
                  completely orthogonal to shape.

                  Internal/derived: not user-settable, and empty for any Oneprovider
                  that has never completed its first managed bootstrap (nothing to
                  protect yet).
                enum:
                - PerRoleComposed
                - Legacy
                type: string
              ozConnectivity:
                description: |-
                  ozConnectivity summarizes reachability between this Oneprovider and
                  its Onezone.

                  For a managed Oneprovider, this is a TRUTHFUL, RPC-verified
                  signal of op_worker's own Graph Sync (GS) channel state (research/
                  truthful-status.md), not merely onepanel's own reachability -- a
                  prior version of this field could read "connected" for 13+ minutes
                  while op_worker's real GS channel was durably down (onepanel's REST
                  layer only ever reflects ITS OWN reachability, never op_worker's).
                  Values:
                    - "connected": op_worker's GS channel to Onezone is confirmed up
                      (verified within the last few minutes; see
                      conditionOzWorkerGraphSyncVerified for exactly when).
                    - "disconnected": onepanel is reachable, but op_worker's GS
                      channel is confirmed DOWN -- a real problem (e.g. a clock-sync
                      stall) or, briefly during fresh-deploy bootstrap, the cluster
                      still being inside its safe-mode init window (self-corrects
                      within 1-2 reconciles).
                    - "unknown": EITHER onepanel's own reachability check failed,
                      OR onepanel is reachable but op_worker's real state could not
                      be verified (RPC timeout/error).
                  For a drive-first (unmanaged) Oneprovider, this field falls back to
                  onepanel-reachability-only semantics (the pre-fix behavior): there
                  is no operator-controlled pod to verify op_worker's real state
                  through, so it is never set to "disconnected".
                type: string
              ozWorkerGraphSyncCheckedAt:
                description: |-
                  ozWorkerGraphSyncCheckedAt is the timestamp of the most recent
                  attempt (successful or not) to verify op_worker's real Graph Sync
                  channel state for ozConnectivity -- bounds how often the operator
                  execs an RPC into the provider pod to avoid a per-reconcile cost;
                  see reconcileOzWorkerGSVerification's doc comment
                  (oneprovider_ozworker_gs.go) for the edge/TTL schedule this backs.
                  Only ever set for a managed Oneprovider.
                format: date-time
                type: string
              ozWorkerGraphSyncFunction:
                description: |-
                  ozWorkerGraphSyncFunction caches which of the two known
                  gs_channel_service zero-arg exported readiness-check functions
                  (is_connected_and_initialized | is_connected) this Oneprovider's
                  op_worker build actually exports, once successfully determined --
                  different op_worker builds export different ones (this project's
                  own fleet runs both today: the 21.02.7 release line vs. the it.230
                  dated develop-line snapshots landscapes actually pin), see
                  deploy/opworker_gs_checker.go's top doc comment for the full
                  version-matrix citation and dual-binding fallback design. Passed
                  back as a hint on the next verification so the common case (the
                  SAME binding still works) needs only one RPC attempt, not two.
                  Empty until the first successful verification, or if neither
                  binding was found to work.
                type: string
              phase:
                description: |-
                  phase summarizes the current lifecycle state of the Oneprovider
                  deployment.
                enum:
                - Pending
                - Deploying
                - Ready
                - Degraded
                type: string
              providerId:
                description: |-
                  providerId is the Onezone-assigned identifier for this Oneprovider,
                  populated once registration succeeds.
                type: string
              registered:
                description: |-
                  registered reports whether this Oneprovider has successfully
                  registered with its target Onezone.
                type: boolean
              rootTokenSecretRef:
                description: |-
                  rootTokenSecretRef names the Secret (in the same namespace) holding
                  this Oneprovider's root/admin access token, created once
                  registration succeeds.

                  MVP limitation: the onepanel API this operator currently targets
                  returns "204 No Content" from provider registration (POST
                  /provider) -- no token of any kind is returned in the response
                  body, and no other onepanel endpoint returns one either. Until a
                  real root/access token source is identified (e.g. plumbed in from
                  Onezone), this Secret holds only the Onezone-assigned providerId
                  as the reconciliation anchor, not an actual access token.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              supportedSpaces:
                description: |-
                  supportedSpaces lists the Space IDs currently supported by this
                  Oneprovider.
                items:
                  type: string
                type: array
              workerLiveGrowHost:
                description: |-
                  workerLiveGrowHost is the single worker host FQDN currently
                  undergoing a growMode:Live join attempt (design it.173/175/182), or
                  "" if none is in flight. Unlike WorkerScaleUpTaskID (one task id
                  covers an arbitrary batch of hosts, because onepanel's add_nodes
                  itself batches), live-grow provisions and observes exactly ONE host
                  at a time -- see reconcileWorkerLiveGrow's (oneprovider_livegrow.go)
                  doc comment for why batching live joins is deliberately out of
                  scope. A workerNodes increase of more than one, on Live, is handled
                  by looping this single-host state machine across successive
                  reconciles, oldest-desired-ordinal first.
                type: string
              workerLiveGrowStartedAt:
