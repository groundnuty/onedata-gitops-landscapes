---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: groups.onedata.org
spec:
  group: onedata.org
  names:
    kind: Group
    listKind: GroupList
    plural: groups
    singular: group
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Group Name
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.groupId
      name: GroupID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Group is the Schema for the groups API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Group
            properties:
              memberGroups:
                description: |-
                  memberGroups references other Group custom resources (in the same
                  namespace) that should become child groups of this group in
                  onezone's groups_graph -- i.e. every effective member of a
                  referenced group also becomes an effective member of this group.
                  Each referenced Group must have a non-empty status.groupId before
                  it can be added as a child; one without it yet is skipped for this
                  reconcile and retried on a later one.

                  Additive only, like memberUsers -- see its doc comment for why
                  removal reconciliation is a flagged TODO rather than implemented.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              memberUsers:
                description: |-
                  memberUsers references User custom resources (in the same
                  namespace) whose onezone accounts should be added as members of
                  this group. Each referenced User must have a non-empty
                  status.userId before it can be added; one without it yet is
                  skipped for this reconcile and retried on a later one (see
                  reconcileMemberUsers's doc comment in group_members.go).

                  Membership reconciliation is additive only: a user present here is
                  added if missing, but a user removed from this list is NOT removed
                  from the group by this controller.

                  member" provenance model exists -- removing a user added by some
                  other actor than this controller would be surprising.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              name:
                description: name is the human-readable name of the group.
                maxLength: 253
                minLength: 1
                type: string
              onezoneRef:
                description: |-
                  onezoneRef identifies the Onezone in which this group is created.

                  MVP/drive-first limitation: mirrors Space's identical field (see
                  its doc comment in space_types.go) -- only onezoneRef.endpoint is
                  currently honored; onezoneRef.name (a managed Onezone CR) is not
                  yet resolved to a REST endpoint.
                properties:
                  endpoint:
                    description: |-
                      endpoint is the externally reachable Onezone domain or URL to
                      register with. Used when the target Onezone is not managed by this
                      operator (e.g. a shared, pre-existing zone).
                    type: string
                  name:
                    description: name of the Onezone custom resource in the same namespace.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: either name or endpoint must be set
                  rule: has(self.name) || has(self.endpoint)
              ownerTokenSecretRef:
                description: |-
                  ownerTokenSecretRef references a Secret (in the same namespace
                  unless the reference sets its own namespace) holding an onezone
                  access token, under the "token" key, for the identity that creates
                  and administers this group. Mirrors Space's
                  spec.ownerTokenSecretRef (see its doc comment in space_types.go):
                  the group is created via create_user_group (POST /user/groups),
                  which creates a group owned by whichever identity the token
                  authenticates as, rather than the admin-only create_group. That
                  same identity automatically holds full privileges on its own group
                  (onezone grants a group's creator every group privilege), so this
                  one token is also used for every membership-management call this
                  controller makes (add_group_user, add_child_group).

                  For spec.spacePrivileges to reconcile successfully, this identity
                  must ALSO already hold sufficient privileges on every referenced
                  Space (e.g. by being that space's owner) -- granting a group access
                  to a space it does not already have standing in is not something
                  this controller can bootstrap on its own. This is a flagged MVP
                  simplification: a more general model would resolve a dedicated
                  actor per space (e.g. via an invite-token exchange, mirroring
                  group_join_space) instead of relying on one token to double as
                  both group administrator and space administrator.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              spacePrivileges:
                description: |-
                  spacePrivileges grants this group privileges in one or more Spaces.

                  Reconciliation is additive only, like memberUsers/memberGroups: a
                  privilege listed here is granted if not already held, but a
                  privilege removed from this list is NOT revoked by this controller.

                  memberUsers's doc comment) is implemented for group/child-group
                  membership too, so all three follow one consistent model.
                items:
                  description: |-
                    GroupSpacePrivilegeGrant associates a Space (referenced by the Space
                    custom resource in the same namespace) with the onezone space
                    privileges this Group should hold in that space.
                  properties:
                    privileges:
                      description: |-
                        privileges is the list of onezone space privileges (e.g.
                        "space_read_data", "space_write_data" -- see
                        internal/onezone/models.SpacePrivileges for onezone's authoritative
                        enum) this group should be granted in the referenced space.
                        Validated at reconcile time against that generated swagger enum
                        rather than via a CRD-level enum-on-array-items marker, so this
                        type does not depend on a specific controller-gen version's support
                        for that marker form.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    spaceRef:
                      description: |-
                        spaceRef identifies the Space custom resource (in the same
                        namespace) this group should be granted privileges in. The
                        referenced Space must have a non-empty status.spaceId before this
                        entry can be reconciled; until then it is skipped and retried on a
                        later reconcile (see reconcileSpacePrivileges's doc comment in
                        group_privileges.go).
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                  required:
                  - privileges
                  - spaceRef
                  type: object
                type: array
              type:
                default: team
                description: |-
                  type is the onezone group type. Defaults to "team" -- onezone's own
                  default, see GroupCreateRequest's doc comment in
                  internal/onezone/models/group_create_request.go -- when unset.
                enum:
                - organization
                - unit
                - team
                - role_holders
                type: string
            required:
            - name
            - onezoneRef
            type: object
          status:
            description: status defines the observed state of Group
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Group resource.
                  Each condition has a unique type and reflects the status of a
                  specific aspect of the resource.

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              groupId:
                description: |-
                  groupId is the Onezone-assigned identifier for this group,
                  populated once it is created.
                type: string
              observedMemberGroupIds:
                description: |-
                  observedMemberGroupIds lists the onezone group ids last confirmed
                  (via list_child_groups) as child groups of this group.
                items:
                  type: string
                type: array
              observedMemberUserIds:
                description: |-
                  observedMemberUserIds lists the onezone user ids last confirmed
                  (via list_group_users) as members of this group. May include ids
                  not reachable from spec.memberUsers -- e.g. added by another actor,
                  or by a User CR since removed from spec.memberUsers -- since
                  membership reconciliation is additive only (see spec.memberUsers's
                  doc comment): they are observed here but not acted on.
                items:
                  type: string
                type: array
              observedSpacePrivileges:
                description: |-
                  observedSpacePrivileges lists the privileges last confirmed (via
                  list_group_space_privileges) as granted to this group in each
                  referenced Space that could be resolved.
                items:
                  description: |-
                    ObservedGroupSpacePrivilege reflects the privileges last confirmed (via
                    list_group_space_privileges) as granted to a Group in a specific Space,
                    identified by the Space's onezone-assigned spaceId -- what
                    list_group_space_privileges is keyed on -- rather than the Space CR's
                    Kubernetes name.
                  properties:
                    privileges:
                      description: |-
                        privileges is the list of privileges last confirmed as granted to
                        this group in the space identified by spaceId.
                      items:
                        type: string
                      type: array
                    spaceId:
                      description: |-
                        spaceId is the onezone-assigned identifier of the Space these
                        privileges were observed in.
                      type: string
                  required:
                  - spaceId
                  type: object
                type: array
              phase:
                description: phase summarizes the current lifecycle state of the group.
                enum:
                - Pending
                - Deploying
                - Ready
                - Degraded
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
