      type: string
    - jsonPath: .spec.userRef.name
      name: User
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Oneclient is the Schema for the oneclients API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Oneclient
            properties:
              oneproviderRef:
                description: |-
                  oneproviderRef identifies the Oneprovider (in the same namespace)
                  this oneclient mounts spaces from. Its op-worker domain is resolved
                  the same way the operator already advertises that Oneprovider to
                  Onezone (see effectiveDomain in internal/controller/oneprovider_managed.go):
                  spec.domain if set, otherwise (managed Oneproviders only) the
                  operator-derived in-cluster node FQDN.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              spaces:
                description: |-
                  spaces optionally restricts which of the user's spaces are mounted,
                  by name (oneclient's own --space flag). Empty or omitted (the
                  default) mounts every space the user has access to.
                items:
                  type: string
                type: array
              userRef:
                description: |-
                  userRef identifies the User (in the same namespace) whose onezone
                  access token this oneclient mounts as -- reusing the token already
                  minted and persisted by UserReconciler at status.accessTokenSecretRef
                  (see internal/controller/user_token.go's reconcileMintAccessToken).
                  A User with no minted token yet leaves this Oneclient Pending.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - oneproviderRef
            - userRef
            type: object
          status:
