                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              mountedSpaces:
                description: |-
                  mountedSpaces lists the space names this Oneclient's Deployment was
                  configured to mount, once its pod reports Ready.

                  MVP limitation: this reflects configured *intent*
                  (spec.spaces once the Deployment is healthy), not an
                  empirically-observed mount table -- there is no Kubernetes-API-level
                  signal for what oneclient actually mounted inside its FUSE
                  filesystem short of exec'ing into the pod, which this controller
                  does not do. When spec.spaces is empty (meaning "all of the user's
                  spaces"), this is left empty too, since enumerating "all" requires
                  a onezone REST call this controller does not make. Live mount
                  verification (read/write a file across providers) happens
                  out-of-band, at the landscape-assembly step (design
                  maximal-e2e-design.md's build sequence item 4).
                items:
                  type: string
                type: array
              phase:
                description: phase summarizes the current lifecycle state of the oneclient
                  mount.
                enum:
                - Pending
                - Deploying
                - Ready
                - Degraded
                type: string
            type: object
