metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: oneclients.onedata.org
spec:
  group: onedata.org
  names:
    kind: Oneclient
    listKind: OneclientList
    plural: oneclients
    singular: oneclient
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.oneproviderRef.name
