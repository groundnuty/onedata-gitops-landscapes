---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: users.onedata.org
spec:
  group: onedata.org
  names:
    kind: User
    listKind: UserList
    plural: users
    singular: user
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.username
      name: Username
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.userId
      name: UserID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: User is the Schema for the users API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of User
            properties:
              attributesSecretRef:
                description: |-
                  attributesSecretRef optionally references a Secret carrying
                  additional user attributes used when creating the account -- keys
                  "password" (required by Onepanel's add_onezone_user for the Basic
                  auth account this controller creates) and "fullName" (optional).
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              onepanelCredentialsSecretRef:
                description: |-
                  onepanelCredentialsSecretRef references the Secret (in the same
                  namespace unless the reference sets its own namespace) holding
                  basic-auth credentials -- keys "username" and "password" -- used to
                  authenticate against onepanelEndpoint. Onepanel's user_management
                  API is an administrative endpoint with no anonymous access, so this
                  is required (unlike StorageBackend's onepanelCredentialsSecretRef,
                  whose absence is tolerated because that onepanel's health/public
                  endpoints work without auth): a User with this unset never
                  progresses past Degraded.

                  TEMPORARY / MVP / drive-first field: see onepanelEndpoint's doc
                  comment.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              onepanelEndpoint:
                description: |-
                  onepanelEndpoint is the HTTPS URL (or bare host[:port]) of an
                  existing, already-deployed onezone-panel (onepanel built in
                  oz_panel mode) instance for the Onezone identified by onezoneRef,
                  e.g. "https://onezone.example.com:9443". User accounts are created
                  and read via this onepanel's user_management API
                  (add_onezone_user / get_onezone_user), not the onezone REST API.

                  TEMPORARY / MVP / drive-first field: mirrors
                  OnezoneSpec.OnepanelEndpoint (see its doc comment in
                  onezone_types.go) rather than being derived from onezoneRef, so
                  this controller can reconcile independently before the operator
                  gains the ability to resolve a Onezone's onepanel endpoint from the
                  referenced resource's own status. Expected to become unnecessary
                  once that resolution exists.
                type: string
              onezoneRef:
                description: |-
                  onezoneRef identifies the Onezone in which this user account is
                  provisioned.
                properties:
                  endpoint:
                    description: |-
                      endpoint is the externally reachable Onezone domain or URL to
                      register with. Used when the target Onezone is not managed by this
                      operator (e.g. a shared, pre-existing zone).
                    type: string
                  name:
                    description: name of the Onezone custom resource in the same namespace.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: either name or endpoint must be set
                  rule: has(self.name) || has(self.endpoint)
              username:
                description: username is the login/handle for the user account.
                maxLength: 253
                minLength: 1
                type: string
            required:
            - onezoneRef
            - username
            type: object
          status:
            description: status defines the observed state of User
            properties:
              accessTokenSecretRef:
                description: |-
                  accessTokenSecretRef references the Secret (owned by this User,
                  created and updated only by this controller) holding a onezone
                  access token minted on this account's behalf -- see
                  reconcileMintAccessToken's doc comment in
                  internal/controller/user_token.go for the full mint+persist flow,
                  and demo-a findings.md §2.2 item 2 for the manual step this closes.
                  Populated once (opportunistically, not required for the User itself
                  to be Ready) and never cleared afterward. Consumers such as
                  Space.spec.ownerRef / Support (via the referenced Space's
                  spec.ownerRef) resolve this field to obtain a token without a
                  human having to mint and hand one over.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              conditions:
                description: |-
                  conditions represent the current state of the User resource.
                  Each condition has a unique type and reflects the status of a
                  specific aspect of the resource.

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase summarizes the current lifecycle state of the user
                  account.
                enum:
                - Pending
                - Deploying
                - Ready
                - Degraded
                type: string
              userId:
                description: |-
                  userId is the Onezone-assigned identifier for this user account,
                  populated once it is created.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
