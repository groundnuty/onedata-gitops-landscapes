# Namespace-scoped onedata-operator instance for sv-federation ONLY:
# --watch-namespace restricts its controller-runtime cache to
# sv-federation, the it.176 "operator version lives in the landscape"
# model -- never sees, and cannot reconcile, any other landscape's own
# namespace-scoped operator/CRs.
#
# IMAGE PIN (design it.335 Finding G + Finding H fix, 2026-07-20):
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5d
# (digest sha256:e59ee42ecf6e500b848d5660877d1cef42dd3e9855f915ce6f04d4a7331eb48a,
# master 8705a3a -- extends the operator's own ConfigMap-backed
# overlay.config rendering to carry TWO durable fields the k8s deployment
# self-heal blocker needs: op_worker's cm_nodes (Finding G, master
# e430928, alongside the already-durable db_nodes) AND cluster_manager's
# own worker_num (Finding H, master 8705a3a, discovered live while
# hands-off-proving Finding G's fix: once a worker actually reaches
# cluster_manager, cluster_manager_server crashes processing its
# cluster_init_step_report cast with worker_num undefined -- confirmed
# live in cm-0's own erlang.log.1). Both close the SAME systemic gap
# large-dev:/mnt/data/work/phase4/p5-on9-finale.md's Finding G
# root-caused: onepanel's own service mnesia ctx table (0029/
# CONFIG_SELF_HEAL's durable source for cm_nodes/db_nodes AND its own
# cluster_manager-side worker_num sibling) is never populated by this
# operator's provisioning flow, on any host. Superseded from v0.6.5-p5b
# (e11f14b, the P5 operator heal batch: heal-budget incident-debounce,
# per-role ozConnectivity exec-target, secondary-worker heal w/ positive
# k8s-Ready detection + the 0023 rejoin seam, joinGate built default-off)
# specifically so a recreated secondary worker gets durable cm_nodes/
# worker_num connectivity straight from the ConfigMap, no self-heal
# required. v0.6.5+ REQUIRES patched component images (see
# crs/oneprovider-a.yaml / crs/oneprovider-b.yaml / crs/onezone.yaml's
# IMAGE notes) -- do not pair with stock/vanilla core images.
#
# `make harbor-pull-secret NS=sv-federation` must be run before this
# pulls -- see the landscape README's gated deploy order.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-federation-operator
  namespace: sv-federation
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: onedata-operator
    landscape: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      landscape: sv-federation
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: onedata-operator
        landscape: sv-federation
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sv-federation-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5d
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --watch-namespace=sv-federation
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
