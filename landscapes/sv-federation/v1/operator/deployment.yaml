# Namespace-scoped onedata-operator instance for sv-federation ONLY:
# --watch-namespace restricts its controller-runtime cache to
# sv-federation, the it.176 "operator version lives in the landscape"
# model -- never sees, and cannot reconcile, any other landscape's own
# namespace-scoped operator/CRs.
#
# IMAGE PIN (design it.335/Finding G fix, 2026-07-20):
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5c
# (digest sha256:ecd4d958386fa2b22794d8556b1ae4d9978bf48d2d8e6158b3626e2ffdf9ad0d,
# master e430928 -- extends the operator's own ConfigMap-backed
# overlay.config rendering to ALSO carry cm_nodes (alongside the
# already-durable db_nodes), closing the k8s deployment self-heal
# blocker large-dev:/mnt/data/work/phase4/p5-on9-finale.md's Finding G
# root-caused: onepanel's own service mnesia ctx table (0029/
# CONFIG_SELF_HEAL's durable source) is never populated by this
# operator's provisioning flow, on any host. Superseded from v0.6.5-p5b
# (e11f14b, the P5 operator heal batch: heal-budget incident-debounce,
# per-role ozConnectivity exec-target, secondary-worker heal w/ positive
# k8s-Ready detection + the 0023 rejoin seam, joinGate built default-off)
# specifically so a recreated secondary worker gets durable cm_nodes
# connectivity straight from the ConfigMap, no self-heal required.
# v0.6.5+ REQUIRES patched component images (see crs/oneprovider-a.yaml /
# crs/oneprovider-b.yaml / crs/onezone.yaml's IMAGE notes) -- do not
# pair with stock/vanilla core images.
#
# `make harbor-pull-secret NS=sv-federation` must be run before this
# pulls -- see the landscape README's gated deploy order.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-federation-operator
  namespace: sv-federation
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: onedata-operator
    landscape: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      landscape: sv-federation
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: onedata-operator
        landscape: sv-federation
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sv-federation-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5c
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --watch-namespace=sv-federation
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
