# Namespace-scoped onedata-operator instance for sv-federation ONLY:
# --watch-namespace restricts its controller-runtime cache to
# sv-federation, the it.176 "operator version lives in the landscape"
# model -- never sees, and cannot reconcile, any other landscape's own
# namespace-scoped operator/CRs.
#
# IMAGE PIN (design it.337, op-cm-restart-heal session, 2026-07-20):
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5e
# (digest sha256:4e340dd5ccd5083dd4031e58ef617854fa4c94a1251bb80d2484d67e72f10ef4,
# master 87c555e -- closes the LAST gap of the deployment self-heal
# blocker cascade (Finding G/H, p5d above): a crash-looping
# cluster_manager_server (Finding H, undefined worker_num) is an OTP
# supervisor-child restart that never touches epmd/the VM, so it never
# failed the epmd-nodename readinessProbe and cm-0 never restarted to
# pick up its now-correct overlay.config ConfigMap. p5e adds (1) a REAL
# cm startupProbe+livenessProbe (self-RPC worker_num check, kubelet
# restarts the CONTAINER on failure -- confirmed sufficient via a
# clean-room subPath-refresh test, no pod recreate needed), (2) a
# checksum/config pod-template annotation (panel+worker overlay only,
# deliberately excluding manager/topology-count-derived config to avoid
# reintroducing design it.145's survivor-restart defect), and (3) a
# managedValuesRenderingVersion status gate so a FUTURE operator-image
# upgrade alone (no CR spec edit) automatically re-renders an
# already-deployed release -- the exact manual spec.geo nudge this
# landscape's own history (p5c/p5d flips below) twice required.
# Superseded from v0.6.5-p5d (8705a3a, Finding G cm_nodes + Finding H
# worker_num overlay.config fixes -- both FIXED+PROVEN at the
# config-rendering layer; p5e is what makes Finding H's fix take LIVE
# effect hands-off) <- v0.6.5-p5b (e11f14b, the P5 operator heal batch).
# v0.6.5+ REQUIRES patched component images (see
# crs/oneprovider-a.yaml / crs/oneprovider-b.yaml / crs/onezone.yaml's
# IMAGE notes) -- do not pair with stock/vanilla core images.
#
# `make harbor-pull-secret NS=sv-federation` must be run before this
# pulls -- see the landscape README's gated deploy order.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-federation-operator
  namespace: sv-federation
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: onedata-operator
    landscape: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      landscape: sv-federation
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: onedata-operator
        landscape: sv-federation
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sv-federation-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5e
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --watch-namespace=sv-federation
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
