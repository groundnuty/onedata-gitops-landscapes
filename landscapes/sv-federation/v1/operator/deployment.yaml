# Namespace-scoped onedata-operator instance for sv-federation ONLY:
# --watch-namespace restricts its controller-runtime cache to
# sv-federation, the it.176 "operator version lives in the landscape"
# model -- never sees, and cannot reconcile, any other landscape's own
# namespace-scoped operator/CRs.
#
# IMAGE PIN (P5 CLOSE-OUT FLIP, it.295-closeout, 2026-07-19):
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5
# (digest sha256:3be1dcfbb0673e016940ad7248e58f680c57af1be0bc4957d4aca58857f6d064,
# master e11f14b -- the P5 operator heal batch: heal-budget incident-
# debounce, per-role ozConnectivity exec-target, secondary-worker heal
# w/ positive k8s-Ready detection + the 0023 rejoin seam, joinGate
# built default-off). Superseded from v0.6.5 (7317e98) specifically so
# provider-b's secondary-worker heal can positively detect + recreate
# its stuck workers and hand off to REJOIN_NODES on the (also newly
# re-pinned, see crs/oneprovider-b.yaml) -on7 image. v0.6.5+ REQUIRES
# patched component images (see crs/oneprovider-a.yaml /
# crs/oneprovider-b.yaml / crs/onezone.yaml's IMAGE notes) -- do not
# pair with stock/vanilla core images.
#
# `make harbor-pull-secret NS=sv-federation` must be run before this
# pulls -- see the landscape README's gated deploy order.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-federation-operator
  namespace: sv-federation
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: onedata-operator
    landscape: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      landscape: sv-federation
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: onedata-operator
        landscape: sv-federation
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sv-federation-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5-p5
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --watch-namespace=sv-federation
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
