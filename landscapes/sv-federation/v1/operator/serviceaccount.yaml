# imagePullSecrets: harbor-dev-pull -- the operator image comes from
# Harbor's PRIVATE `dev` project (design it.203), same pattern as
# sv-posix-multinode/v2. EXTERNAL PREREQUISITE (not created by this
# repo): `make harbor-pull-secret NS=sv-federation` must be run before
# this ServiceAccount's pod can pull.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sv-federation-operator
  namespace: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: harbor-dev-pull
