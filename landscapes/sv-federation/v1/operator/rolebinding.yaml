apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sv-federation-operator
  namespace: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sv-federation-operator
subjects:
  - kind: ServiceAccount
    name: sv-federation-operator
    namespace: sv-federation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sv-federation-operator-leader-election
  namespace: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sv-federation-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: sv-federation-operator
    namespace: sv-federation
