# provider-b: second of the two per-role-DECOMPOSED providers -- see
# provider-a's header (crs/oneprovider-a.yaml) for the full mechanism
# and rationale, identical here except for name/storage/credentials.
# provider-a and provider-b are peers, not primary/secondary: the
# federation proof exercises BOTH directions (write via A read via B,
# then write via B read via A).
#
# P5 FINALE FLIP (it.30x, 2026-07-20): re-pinned again to the -on8 image
# (the -on7 seven + VM_ARGS_SELF_HEAL, patch 0024 -- the fix for Finding B,
# the vm.args reset-on-retry race that blocked the P5 close-out session's
# Proofs 2/3). See images/SNAPSHOTS.md "P5 FINALE" sections for the full
# build/verification evidence and phase4/p5-final.md for the proof results.
#
# P5 CLOSE-OUT FLIP (it.295-closeout, 2026-07-19): provider-b is the
# standing live repro of the pre-0023 od_error_node_already_in_cluster
# defect (federation-v1.md Gate 5) -- workers stuck since the
# one-pod-down baseline-hygiene check. Re-pinned to the -on7 image
# (0022 DURABLE_CM_BARRIER + 0023 REJOIN_NODES + 0019c
# safe_report_node_recovery + the -on4 four + CHASH_ACCESSOR_GUARD,
# see images/SNAPSHOTS.md "P5 close-out" sections) to prove the
# secondary-worker heal + REJOIN_NODES self-heals this exact defect
# with no human intervention beyond this image/operator update.
# provider-a and onezone are DELIBERATELY left on their existing
# images (isolation requirement for the close-out proof).
apiVersion: onedata.org/v1alpha1
kind: Oneprovider
metadata:
  name: provider-b
  namespace: sv-federation
  annotations:
    argocd.argoproj.io/sync-wave: "2"
# GENERATION-BUMP NUDGE (design it.335/Finding G proof, 2026-07-20): the
# cm_nodes overlay.config fix (onedata-operator@e430928) is an
# operator-code-only change -- it does not touch this CR's spec. Live
# session discovered that reconcileManagedSpecUpdate
# (internal/controller/oneprovider_managed.go) only re-renders/upgrades a
# managed release's helm values when metadata.generation advances past
# status.managedObservedGeneration, so a bare operator-image flip alone
# does NOT retroactively re-render an already-deployed release. spec.geo
# below is added SOLELY to bump generation and force that re-render --
# semantically inert (only feeds onepanel's cosmetic geolocation
# metadata, never consulted by cluster health/serving/membership) and
# safe to leave in place afterward.
spec:
  name: "provider-b"
  adminEmail: "sv-federation-admin@example.com"
  geo:
    latitude: "0"
    longitude: "0"
  onezoneRef:
    name: zone
    endpoint: zone-onezone.sv-federation.svc.cluster.local
  onepanelCredentialsSecretRef:
    name: provider-b-onepanel-creds
  tls:
    issuerRef:
      name: onedata-dev-ca
      kind: ClusterIssuer
    trustIssuerCA: true
  managed:
    enabled: true
    image: harbor.k8s-one-onedata.dedyn.io:30003/dev/oneprovider-dev:develop-20260720-p0012.0013.0014.0015.0016.0017.0018.0019.0019c.0020.0022.0023.0024.0028.0029-on9
    imagePullSecrets:
      - harbor-dev-pull
    storageVolume:
      persistentVolumeClaim:
        claimName: provider-b-posix
    topology:
      databaseMode: Composed
      databaseNodes: 1
      workerNodes: 2
      managerNodes: 1
