# imagePullSecrets: harbor-dev-pull -- the operator image now comes
# from Harbor's PRIVATE `dev` project (design it.203; see
# deployment.yaml's IMAGE PIN comment), so this ServiceAccount needs
# the pull credential. Kubernetes auto-attaches a ServiceAccount's
# imagePullSecrets to any Pod using it that does not specify its own
# (documented k8s behavior) -- the operator Deployment
# (deployment.yaml) does not set spec.imagePullSecrets itself, relying
# on exactly this.
#
# EXTERNAL PREREQUISITE (not created by this repo, same category as
# v1's docker-onedata-org secret): the harbor-dev-pull Secret must
# exist in THIS namespace before this ServiceAccount's pod can pull --
# see the top-level README's "The pull-secret pattern" section:
#
#   make harbor-pull-secret NS=sv-posix-multinode-v2
#
# Run it right after (or before, if re-running) this landscape's
# Application syncs -- the namespace it targets is created by this
# same sync's wave -1. If the operator pod races ahead of the secret
# and hits ImagePullBackOff, kubelet's own backoff-retry picks the pull
# up automatically once the secret lands; no manual pod restart
# needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sv-posix-multinode-operator
  namespace: sv-posix-multinode-v2
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: harbor-dev-pull
