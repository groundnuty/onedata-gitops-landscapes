# Namespace-scoped onedata-operator instance for sv-posix-multinode/v2
# ONLY: --watch-namespace restricts its controller-runtime cache to
# sv-posix-multinode-v2, the it.176 "operator version lives in the
# landscape" model -- never sees, and cannot reconcile, v1's own
# namespace-scoped operator/CRs (sv-posix-multinode) or any other
# landscape's.
#
# ============================================================
# IMAGE PIN (it.203 Harbor-for-everything; bumped v0.6.4 -> v0.6.5 by
# the core-first delete+flip release train, deliverables/core-fix-ledger.md):
# ============================================================
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5 --
# Harbor's private `dev` project. Carries forward everything v0.6.4 had
# (commonName fix, F12 mitigation) plus v0.6.5's delete pass: the
# clock-sync-kick heal, the F12 stale-host health bypass, and the
# workerOverlayConfig oz_domain emission are all DELETED (their core
# fixes are proven and now flip ON in this landscape's own component
# images -- crs/oneprovider.yaml / crs/onezone.yaml's IMAGE notes).
# v0.6.5+ REQUIRES those patched component images; do not pair a
# v0.6.5+ operator with a stock/vanilla core image (see the operator
# repo's own README "v0.6.5+ patched-image dependency" section).
#
# This is a DELIBERATE it.203 policy choice, not the it.183 exception:
# Harbor is now the DEFAULT image path for landscapes going forward
# (superseding it.178's "public refs are the baseline, Harbor is an
# authorized exception" framing for the OPERATOR image specifically),
# even though a public groundnuty/onedata-operator:v0.6.3 will ALSO
# exist. The honest caveat still applies regardless of which policy
# framing you use: THIS manifest pins the Harbor ref, so pulling it on
# any cluster without an equivalent Harbor `dev` project + pull-secret
# will fail -- see operator/serviceaccount.yaml's imagePullSecrets +
# the top-level README's "The pull-secret pattern" section. A cluster
# without this Harbor could substitute the public
# groundnuty/onedata-operator:v0.6.3 ref instead (same bits, different
# registry) -- not what this reference landscape does, by the it.203
# directive.
#
# `make harbor-pull-secret NS=sv-posix-multinode-v2` must be (re-)run
# before this bump reaches a live cluster -- see the landscape README's
# gated deploy order. This is a git-only change as of this sweep (see
# the landscape README's "Image pins" note on syncPolicy).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-posix-multinode-operator
  namespace: sv-posix-multinode-v2
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: onedata-operator
    landscape: sv-posix-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      landscape: sv-posix-multinode
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: onedata-operator
        landscape: sv-posix-multinode
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sv-posix-multinode-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          # See the IMAGE PIN note at the top of this file.
          image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.5
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --watch-namespace=sv-posix-multinode-v2
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
