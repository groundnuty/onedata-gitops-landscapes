# Single managed Oneprovider, exercising the SAME it.161/164 feature v1
# proved live on real hardware (design it.198's multi-node RWX-posix
# payoff): spec.managed.storageVolume (the pre-existing RWX PVC,
# storage-pvc.yaml) + spec.managed.topology.workerNodes: 2 -- two
# op_worker pods sharing one nfs-xattr PVC, no per-pod subPathExpr.
#
# v2 deltas from v1's crs/oneprovider.yaml (design it.196/203) -- same
# two changes as crs/onezone.yaml, mirrored here:
#
# 1. spec.tls: onedata-dev-ca ClusterIssuer, issuerRef ONLY (see
#    onezone.yaml's header for the full why, and for the Finding 11
#    de-mine this file also received).
#
# 2. spec.managed.image: harbor.../dockerhub-proxy/onedata/
#    oneprovider:21.02.7 (public image, proxy-cached, no
#    imagePullSecret needed) instead of v1's private
#    docker.onedata.org/oneprovider-dev:develop + the external
#    docker-onedata-org imagePullSecret it required.
#
# storageVolume/topology are UNCHANGED from v1 -- same feature, same
# shape, just a different namespace and image source.
#
# DE-MINED (it.238, Finding 11): trustIssuerCA: true removed. Finding
# 11 (evidence research/rtransfer-cafix.md, design log it.221/it.225)
# root-caused trustIssuerCA on a MANAGED Oneprovider to a Fizz-TLS
# uncaught exception in op_worker's rtransfer_config:make_ca_bundle/0
# -- ANY unpaired trust-anchor cert in the ssl_ca_path bundle (ours or
# vanilla) is treated as an identity candidate requiring a matching
# key and crashes rtransfer_link in an unbounded zero-backoff respawn
# loop; core-side only, no operator-side mount composition can fix it
# (a CA cert genuinely has no matching key). Controlled A/B fully
# disproved both operator-side hypotheses -- trustIssuerCA:true is
# KNOWN-BROKEN with a managed Oneprovider until the core fix
# (rtransfer_config.erl) reaches the deployed image. issuerRef-only
# (this file, now) is the supported shape: it still issues our web
# cert via the shared onedata-dev-ca ClusterIssuer, it just does not
# add that CA to op_worker's own trust store. Practical consequence:
# this Oneprovider's onepanel<->Onezone TLS handshake relies on
# whatever trust the operator's cert-MVP otherwise establishes, NOT on
# trustIssuerCA -- see platform/onedata-dev-ca/README.md for the
# current story and sv-livegrow/v1/README.md's "dev-CA TLS status"
# note for why sv-livegrow could not make the same trade (it needs
# trustIssuerCA for registration to complete at all, and eats the
# crash-loop as a known, operationally-mitigated cost until patch 0013
# lands in a deployed image).
apiVersion: onedata.org/v1alpha1
kind: Oneprovider
metadata:
  name: provider
  namespace: sv-posix-multinode-v2
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: "provider"
  adminEmail: "sv-posix-multinode-admin@example.com"
  onezoneRef:
    name: zone
    endpoint: zone-onezone.sv-posix-multinode-v2.svc.cluster.local
  onepanelCredentialsSecretRef:
    name: provider-onepanel-creds
  tls:
    issuerRef:
      name: onedata-dev-ca
      kind: ClusterIssuer
  managed:
    enabled: true
    image: harbor.k8s-one-onedata.dedyn.io:30003/dockerhub-proxy/onedata/oneprovider:21.02.7
    storageVolume:
      persistentVolumeClaim:
        claimName: sv-posix-multinode-shared-posix
    topology:
      databaseNodes: 1
      workerNodes: 3
