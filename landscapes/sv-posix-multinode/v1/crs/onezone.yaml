# Managed Onezone, modeled on demo/landscape-max's 01-onezone.yaml.
# Domain left unset so the operator defaults it to the derived node FQDN
# -- no real DNS/ingress in this landscape either (same known gap as
# every demo/ landscape in the operator repo).
#
# PREREQUISITE (external, NOT created by this repo): an imagePullSecret
# named docker-onedata-org must already exist in the sv-posix-multinode
# namespace, holding real credentials for the private
# docker.onedata.org registry. This is genuine infra credentials, not a
# demo value -- it is deliberately NOT committed here, unlike
# crs/secrets.yaml's demo creds. Same prerequisite as demo/landscape-3p
# and demo/landscape-max.
apiVersion: onedata.org/v1alpha1
kind: Onezone
metadata:
  name: zone
  namespace: sv-posix-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: "sv-posix-multinode-zone"
  adminAccountSecretRef:
    name: onezone-admin-account
  onepanelCredentialsSecretRef:
    name: onezone-onepanel-creds
  managed:
    enabled: true
    image: docker.onedata.org/onezone-dev:develop
    imagePullSecrets:
      - docker-onedata-org
