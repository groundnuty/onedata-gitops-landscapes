# Managed Onezone, modeled on demo/landscape-max's 01-onezone.yaml.
# Domain left unset so the operator defaults it to the derived node FQDN
# -- no real DNS/ingress in this landscape either (same known gap as
# every demo/ landscape in the operator repo).
#
# IMAGE (it.230/it.238 re-pin): was docker.onedata.org/onezone-dev
# :develop, a mutable tag pulled from the private docker.onedata.org
# registry (external docker-onedata-org imagePullSecret). Per the
# it.230 standing policy (never deploy a mutable Onedata tag) this now
# points at the exact image already snapshotted into Harbor's private
# `dev` project -- images/SNAPSHOTS.md, second row -- pulled from THIS
# same docker.onedata.org/onezone-dev:develop ref, upstream build
# 2026-07-12 (paired -dev lineage with oneprovider.yaml's snapshot;
# mismatched lineages are a confirmed GraphSync-refusal defect,
# research/m3-live-proof.md §2). Pull secret is now harbor-dev-pull,
# same mechanism sv-posix-multinode/v2 and sv-livegrow already use --
# see operator/serviceaccount.yaml and this landscape's README. The
# docker-onedata-org prerequisite is DROPPED.
#
# PREREQUISITE (external, NOT created by this repo): the harbor-dev-pull
# imagePullSecret must exist in the sv-posix-multinode namespace --
# `make harbor-pull-secret NS=sv-posix-multinode` (needs Harbor's `dev`
# project + robot credential already configured; see the top-level
# README's "The pull-secret pattern"). Genuine infra credentials, not a
# demo value -- correctly NOT committed here, unlike crs/secrets.yaml's
# demo creds.
apiVersion: onedata.org/v1alpha1
kind: Onezone
metadata:
  name: zone
  namespace: sv-posix-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: "sv-posix-multinode-zone"
  adminAccountSecretRef:
    name: onezone-admin-account
  onepanelCredentialsSecretRef:
    name: onezone-onepanel-creds
  managed:
    enabled: true
    image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onezone-dev:develop-20260718
    imagePullSecrets:
      - harbor-dev-pull
