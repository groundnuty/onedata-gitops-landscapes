# Single managed Oneprovider, exercising the it.161/164 feature this
# landscape exists for:
#   - spec.managed.storageVolume: a pre-existing RWX PersistentVolumeClaim
#     (storage-pvc.yaml, nfs-xattr-backed), mounted identically at
#     /volumes/posix across every worker pod -- disables the chart's own
#     built-in per-pod posix PVC.
#   - spec.managed.topology.workerNodes: 2, databaseNodes: 1 (Bundled,
#     the default databaseMode) -- two op_worker pods sharing that one
#     PVC, proving the multi-worker shared-posix pattern.
#
# Same drive-first onezoneRef caveat as demo/landscape-max: BOTH
# onezoneRef.name (token-minting) and onezoneRef.endpoint (chart-value
# wiring) are required.
#
# IMAGE (it.230/it.238 re-pin): was docker.onedata.org/oneprovider-dev
# :develop, a mutable tag pulled from the private docker.onedata.org
# registry (external docker-onedata-org imagePullSecret). Per the
# it.230 standing policy (never deploy a mutable Onedata tag) this now
# points at the exact image already snapshotted into Harbor's private
# `dev` project -- images/SNAPSHOTS.md, first row -- pulled from THIS
# same docker.onedata.org/oneprovider-dev:develop ref, upstream build
# 2026-07-15. Pull secret is now harbor-dev-pull, same mechanism
# sv-posix-multinode/v2 and sv-livegrow already use (see
# operator/serviceaccount.yaml and this landscape's README's "External
# prerequisites"); the docker-onedata-org prerequisite is DROPPED.
apiVersion: onedata.org/v1alpha1
kind: Oneprovider
metadata:
  name: provider
  namespace: sv-posix-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: "provider"
  adminEmail: "sv-posix-multinode-admin@example.com"
  onezoneRef:
    name: zone
    endpoint: zone-onezone.sv-posix-multinode.svc.cluster.local
  onepanelCredentialsSecretRef:
    name: provider-onepanel-creds
  managed:
    enabled: true
    image: harbor.k8s-one-onedata.dedyn.io:30003/dev/oneprovider-dev:develop-20260718
    imagePullSecrets:
      - harbor-dev-pull
    storageVolume:
      persistentVolumeClaim:
        claimName: sv-posix-multinode-shared-posix
    topology:
      databaseNodes: 1
      workerNodes: 2
