# imagePullSecrets: harbor-dev-pull -- the operator image now comes
# from Harbor's PRIVATE `dev` project (it.230/it.238 re-pin to v0.6.3;
# same pattern sv-posix-multinode/v2 and sv-livegrow/v1 already use).
# Kubernetes auto-attaches a ServiceAccount's imagePullSecrets to any
# Pod using it that does not specify its own -- the operator Deployment
# (deployment.yaml) relies on exactly this.
#
# EXTERNAL PREREQUISITE (not created by this repo): the harbor-dev-pull
# Secret must exist in THIS namespace before this ServiceAccount's pod
# can pull:
#
#   make harbor-pull-secret NS=sv-posix-multinode
#
# The SAME secret (created once per namespace by that target) is also
# referenced by crs/oneprovider.yaml's and crs/onezone.yaml's
# spec.managed.imagePullSecrets, since both component images now live
# in Harbor's private `dev` project too (the dated snapshots,
# images/SNAPSHOTS.md).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sv-posix-multinode-operator
  namespace: sv-posix-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: harbor-dev-pull
