# Namespace-scoped onedata-operator instance for the sv-posix-multinode
# landscape ONLY: --watch-namespace restricts its controller-runtime
# cache to this one namespace (cmd/main.go's watchNamespace flag), so it
# never sees (and cannot reconcile, correctly or otherwise) any other
# landscape's CRs -- the it.176 "operator version lives in the
# landscape" model, no cluster-wide-manager fighting.
#
# ============================================================
# IMAGE PIN (it.230/it.238 re-pin, superseding the original scaffold's
# v0.6.0 forward-reference note -- v0.6.0 shipped long ago):
# ============================================================
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.3 --
# Harbor's private `dev` project (design it.203 "Harbor for
# everything"), same image every other landscape in this repo now
# pins. Was groundnuty/onedata-operator:v0.6.0 (public Docker Hub, no
# pull secret) -- bumped straight to v0.6.3 as part of the it.230
# upstream-image-snapshot sweep (it.238), matching
# sv-posix-multinode/v2 and sv-livegrow/v1's operator pins. Needs the
# harbor-dev-pull imagePullSecret (see serviceaccount.yaml and this
# landscape's README's "External prerequisites") -- the previously-bare
# public-image pull needs none, but the private `dev` project does.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-posix-multinode-operator
  namespace: sv-posix-multinode
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: onedata-operator
    landscape: sv-posix-multinode
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      landscape: sv-posix-multinode
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: onedata-operator
        landscape: sv-posix-multinode
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sv-posix-multinode-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          # See the IMAGE PIN note at the top of this file.
          image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.3
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --watch-namespace=sv-posix-multinode
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
