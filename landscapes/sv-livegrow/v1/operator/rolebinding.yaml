apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sv-livegrow-operator
  namespace: sv-livegrow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sv-livegrow-operator
subjects:
  - kind: ServiceAccount
    name: sv-livegrow-operator
    namespace: sv-livegrow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sv-livegrow-operator-leader-election
  namespace: sv-livegrow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sv-livegrow-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: sv-livegrow-operator
    namespace: sv-livegrow
