# imagePullSecrets: harbor-dev-pull -- the operator image comes from
# Harbor's PRIVATE `dev` project (same v0.6.1 pin sv-posix-multinode/v2
# uses; it.203), so this ServiceAccount needs the pull credential.
# Kubernetes auto-attaches a ServiceAccount's imagePullSecrets to any
# Pod using it that does not specify its own -- the operator Deployment
# (deployment.yaml) relies on exactly this.
#
# EXTERNAL PREREQUISITE (not created by this repo): the harbor-dev-pull
# Secret must exist in THIS namespace before this ServiceAccount's pod
# can pull:
#
#   make harbor-pull-secret NS=sv-livegrow
#
# The SAME secret (created once per namespace by that target) is also
# referenced by crs/oneprovider.yaml's spec.managed.imagePullSecrets,
# since the patched Oneprovider image is ALSO in Harbor's private `dev`
# project.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sv-livegrow-operator
  namespace: sv-livegrow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: harbor-dev-pull
