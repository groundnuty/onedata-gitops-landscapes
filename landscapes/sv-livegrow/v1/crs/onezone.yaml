# Managed Onezone, `-dev` nightly lineage to match the patched
# Oneprovider (see oneprovider.yaml's header + kustomization.yaml's
# delta-2 for the full why: pairing a `-dev` nightly provider with the
# vanilla release zone is a confirmed, previously-hit defect --
# m3-live-proof.md §2, permanent GraphSync refusal on version
# mismatch).
#
# Image sourcing (design it.209 "Harbor for everything" directive --
# NOT the docker.onedata.org / docker-onedata-org-imagePullSecret
# pattern sv-posix-multinode/v1 used, which predates that directive):
# `docker.onedata.org/onezone-dev:develop` was pulled once on large-dev
# (already-authenticated docker login) and pushed to Harbor's PRIVATE
# `dev` project as `dev/onezone-dev:develop-livegrow-hw1` -- the same
# treatment as the patched Oneprovider image, so this landscape has
# ZERO dependency on the docker.onedata.org registry or its credential
# at deploy time, matching how sv-posix-multinode/v2 sources every
# image through Harbor. Pull secret: the SAME `harbor-dev-pull` Secret
# (created via `make harbor-pull-secret NS=sv-livegrow`, canonical
# source `harbor-dev-robot` in ns `onedata-gitops-harbor`) already used
# by the operator's own ServiceAccount and by oneprovider.yaml below --
# no second mechanism invented.
#
# TLS: dev-CA ClusterIssuer + trustIssuerCA, same productionized
# pattern as sv-posix-multinode/v2 (platform/onedata-dev-ca/).
apiVersion: onedata.org/v1alpha1
kind: Onezone
metadata:
  name: zone
  namespace: sv-livegrow
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: "sv-livegrow-zone"
  adminAccountSecretRef:
    name: onezone-admin-account
  onepanelCredentialsSecretRef:
    name: onezone-onepanel-creds
  # trustIssuerCA back ON -- REVERTS the it.209-session de-mine attempt,
  # same day, same landscape (see git history: "remove trustIssuerCA").
  # research/rtransfer-cafix.md's minikube A/B found trustIssuerCA's bare
  # CA-trust cert (no matching key) crash-loops rtransfer_link and
  # concluded issuerRef-only (trustIssuerCA off) was a clean, working
  # arm. Live-reproduced on THIS k8s-one hardware landscape with the
  # DYNAMIC_MEMBERSHIP-patched image, that conclusion does NOT hold:
  # (1) the rtransfer_link core-dump crash-loop (~3-4x/sec, Finding 11's
  # ORIGINAL universal mechanism, livegrow-hardware.md Sec.6) persisted
  # IDENTICALLY with trustIssuerCA off and cacerts_dir back to its pure
  # vanilla 2-file shape -- so trustIssuerCA was never the crash's cause
  # on this hardware/image combination, only compounds it on minikube's
  # narrower vanilla-image test; (2) WORSE, trustIssuerCA off actively
  # BROKE registration: Oneprovider's onepanel could not TLS-connect to
  # Onezone at all ("wait_cert_cr ... Fatal - Unknown CA",
  # od_error_no_connection_to_onezone) because trustIssuerCA is what
  # makes onepanel trust the shared onedata-dev-ca ClusterIssuer that
  # ALSO signed Onezone's own web cert -- issuerRef alone issues OUR
  # cert but does not add the issuing CA to OUR trust store. Restored
  # to true so registration can complete; the crash-loop is mitigated
  # operationally (not fixed) via a disk-guard core-dump-cleanup loop
  # for the duration of the hardware proofs -- see hw-elasticity-2.md.
  tls:
    issuerRef:
      name: onedata-dev-ca
      kind: ClusterIssuer
    trustIssuerCA: true
  managed:
    enabled: true
    image: harbor.k8s-one-onedata.dedyn.io:30003/dev/onezone-dev:develop-livegrow-hw1
    imagePullSecrets:
      - harbor-dev-pull
