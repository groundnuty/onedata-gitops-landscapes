# Values used to render vendor/harbor-1.18.4-rendered.yaml via:
#
#   helm repo add harbor https://helm.goharbor.io
#   helm template harbor harbor/harbor --version 1.18.4 \
#     --namespace onedata-gitops-harbor \
#     -f platform/harbor/values.yaml \
#     > /tmp/harbor-rendered-raw.yaml
#   # then the wave-0 annotation is stamped onto every document by
#   # scripts/render-harbor.sh (see platform/harbor/README.md) before
#   # the result is committed as vendor/harbor-1.18.4-rendered.yaml.
#
# Kept in git for reproducibility/re-rendering on a future chart-version
# bump -- it.183/it.178's "vendor the rendered manifests" choice (see
# platform/harbor/README.md's "helm-vendored vs. Argo Helm source" note)
# means Argo CD itself never talks to helm.goharbor.io; only whoever
# re-renders this file locally does.

# --- Exposure: in-cluster Service + NodePort, NOT a public LoadBalancer/Ingress (it.178) ---
expose:
  type: nodePort
  tls:
    # HTTP-internal for v1 (it.178's "quick" option): no self-signed-CA
    # distribution problem for the 22 nodes/large-dev docker daemon to
    # trust. Trade-off documented in README.md's "Exposure and TLS"
    # section; a cert-manager-issued cert is the noted v2 follow-up
    # (same arc as the landscapes' own it.165 TLS work).
    enabled: false
  nodePort:
    ports:
      http:
        port: 80
        # Fixed, not dynamically allocated, so make harbor-login/
        # harbor-push/the landscape pull-secret docs can hardcode it.
        nodePort: 30002

# Placeholder -- replace with an actual k8s-one node's InternalIP at
# deploy time (see README.md's "Exposure and TLS" section; any of the
# 22 node IPs works, NodePort is reachable on all of them). Recon during
# this build read k8s-one-server-0 at 10.87.23.54 as one example.
# Deliberately left as a placeholder rather than baking in one specific
# node's IP as a silent assumption -- externalURL only affects the
# docker-login/pull hints Harbor's own UI prints, not routing.
externalURL: http://REPLACE-WITH-NODE-IP:30002

persistence:
  enabled: true
  # Keep PVCs across a `helm uninstall`/Argo prune -- it.178's "cache
  # survives reinstalls", the whole point of pinning csi-cinder-sc-retain
  # below on top of this.
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: csi-cinder-sc-retain
      size: 20Gi
    jobservice:
      jobLog:
        storageClass: csi-cinder-sc-retain
        size: 1Gi
    database:
      storageClass: csi-cinder-sc-retain
      size: 2Gi
    redis:
      storageClass: csi-cinder-sc-retain
      size: 1Gi

# The admin password comes from our own demo Secret (admin-secret.yaml,
# same plaintext-demo-creds-with-loud-warning convention as every
# landscape's crs/secrets.yaml), not the chart's inline
# harborAdminPassword default ("Harbor12345") -- keeps the one
# plaintext value we commit *visible in one obvious place*, consistent
# with the repo-wide convention, rather than duplicated across a values
# file too.
existingSecretAdminPassword: harbor-admin-secret
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

# --- Resources modest (it.178: "~7 pods + PG + Redis", trivial capacity) ---
trivy:
  enabled: false # scanning is out of scope for a pull-accelerator/dev-push registry; cuts one more-than-modest pod (512Mi-1Gi request/limit)
metrics:
  enabled: false # no Prometheus in this cluster yet; skips the exporter pod

portal:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

core:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

jobservice:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

registry:
  registry:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  controller:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

database:
  internal:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  internal:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
