# Values used to render vendor/harbor-1.18.4-rendered.yaml via:
#
#   helm repo add harbor https://helm.goharbor.io
#   helm template harbor harbor/harbor --version 1.18.4 \
#     --namespace onedata-gitops-harbor \
#     -f platform/harbor/values.yaml \
#     > /tmp/harbor-rendered-raw.yaml
#   # then the wave-0 annotation is stamped onto every document by
#   # scripts/render-harbor.sh (see platform/harbor/README.md) before
#   # the result is committed as vendor/harbor-1.18.4-rendered.yaml.
#
# Kept in git for reproducibility/re-rendering on a future chart-version
# bump -- it.183/it.178's "vendor the rendered manifests" choice (see
# platform/harbor/README.md's "helm-vendored vs. Argo Helm source" note)
# means Argo CD itself never talks to helm.goharbor.io; only whoever
# re-renders this file locally does.

# --- Exposure: in-cluster Service + NodePort, real Let's Encrypt TLS (it.178 -> it.185 v2) ---
expose:
  type: nodePort
  tls:
    # TLS-v2 (it.185 + the maintainer's deSEC decision): a REAL Let's
    # Encrypt certificate, issued by the letsencrypt-dns01 ClusterIssuer
    # (platform/cert-manager-desec/) into the harbor-tls Secret
    # (certificate.yaml), consumed here via certSource=secret. LE roots
    # are natively trusted by all 22 nodes' containerd + large-dev's
    # docker daemon -- the v1 insecure-registry workarounds are GONE,
    # not configured-around (see README.md's "Exposure and TLS (v2)").
    enabled: true
    certSource: secret
    secret:
      # cert-manager's Certificate (certificate.yaml) writes tls.crt/
      # tls.key here. nginx's pod mounts this Secret -- Harbor's front
      # door does not start until issuance completes (deploy order is
      # load-bearing; see README.md).
      secretName: harbor-tls
  nodePort:
    ports:
      http:
        port: 80
        # Kept rendered (the chart emits both ports when TLS is on),
        # but nginx now 301-redirects HTTP to the https externalURL --
        # 30002 is no longer a service endpoint, just a redirect.
        nodePort: 30002
      https:
        port: 443
        # Fixed, not dynamically allocated, so make harbor-login/
        # harbor-push/the landscape pull-secret docs can hardcode it.
        nodePort: 30003

# The one Harbor hostname, resolving (via the deSEC A record --
# `make dns-record`) to a k8s-one node's InternalIP; the NodePort is
# reachable on all 22 nodes. `make set-harbor-domain
# DOMAIN=harbor.<name>.dedyn.io` rewrites the CHANGEME placeholder
# here, in certificate.yaml, and in the vendored render, in one shot.
# externalURL affects the docker-login/pull hints Harbor's UI prints
# AND the token-service URL returned to docker clients -- with TLS it
# must be the https://<cert-SAN>:<https-nodePort> form.
externalURL: https://harbor.CHANGEME.dedyn.io:30003

persistence:
  enabled: true
  # Keep PVCs across a `helm uninstall`/Argo prune -- it.178's "cache
  # survives reinstalls", the whole point of pinning csi-cinder-sc-retain
  # below on top of this.
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: csi-cinder-sc-retain
      size: 20Gi
    jobservice:
      jobLog:
        storageClass: csi-cinder-sc-retain
        size: 1Gi
    database:
      storageClass: csi-cinder-sc-retain
      size: 2Gi
    redis:
      storageClass: csi-cinder-sc-retain
      size: 1Gi

# The admin password comes from our own demo Secret (admin-secret.yaml,
# same plaintext-demo-creds-with-loud-warning convention as every
# landscape's crs/secrets.yaml), not the chart's inline
# harborAdminPassword default ("Harbor12345") -- keeps the one
# plaintext value we commit *visible in one obvious place*, consistent
# with the repo-wide convention, rather than duplicated across a values
# file too.
existingSecretAdminPassword: harbor-admin-secret
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

# --- Resources modest (it.178: "~7 pods + PG + Redis", trivial capacity) ---
trivy:
  enabled: false # scanning is out of scope for a pull-accelerator/dev-push registry; cuts one more-than-modest pod (512Mi-1Gi request/limit)
metrics:
  enabled: false # no Prometheus in this cluster yet; skips the exporter pod

portal:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

core:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

jobservice:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

registry:
  registry:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  controller:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

database:
  internal:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  internal:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
