# ============================================================
# DEMO CREDENTIALS -- PLAINTEXT, NOT FOR PRODUCTION.
# ============================================================
# Same it.176 maintainer's-call convention as every landscape's
# crs/secrets.yaml: fixed, committed, non-secret demo values. NEVER put
# a real credential in this file or this repo. A real fork would
# replace this file with sealed-secrets/SOPS/External-Secrets-Operator
# output -- see the top-level README's opening warning.
#
# Two secrets:
#   harbor-admin-secret  -- Harbor's own "admin" superuser password,
#                            consumed by the vendored chart's
#                            existingSecretAdminPassword (values.yaml).
#   harbor-dev-robot      -- the demo secret for the `dev`-project robot
#                            account (see README.md's "Robot account
#                            and auth model" section). The password
#                            value here is passed VERBATIM as
#                            RobotCreate.secret by config/configure-harbor.sh
#                            -- Harbor's RobotCreate API accepts a
#                            caller-supplied secret instead of only
#                            ever generating a random one, which is what
#                            lets this be a plain committed demo value
#                            (like every other credential in this repo)
#                            rather than something captured off a live
#                            API response and stashed after the fact.
#                            `username` is Harbor's own robot-account
#                            naming convention, `robot$<project>+<name>`
#                            -- baked in here as a literal so nothing is
#                            computed at apply time; config/configure-harbor.sh
#                            uses the same literal short name
#                            ("large-dev-push") when calling RobotCreate.
apiVersion: v1
kind: Secret
metadata:
  name: harbor-admin-secret
  namespace: onedata-gitops-harbor
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  HARBOR_ADMIN_PASSWORD: demo-harbor-admin-password
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-dev-robot
  namespace: onedata-gitops-harbor
  labels:
    app.kubernetes.io/part-of: onedata-gitops-landscapes
    platform-app: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  username: "robot$dev+large-dev-push"
  password: demo-harbor-dev-robot-secret
