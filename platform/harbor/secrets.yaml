# ============================================================
# DEMO CREDENTIALS -- PLAINTEXT, NOT FOR PRODUCTION.
# ============================================================
# Same it.176 maintainer's-call convention as every landscape's
# crs/secrets.yaml: fixed, committed, non-secret demo values. NEVER put
# a real credential in this file or this repo. A real fork would
# replace this file with sealed-secrets/SOPS/External-Secrets-Operator
# output -- see the top-level README's opening warning.
#
# Only ONE secret lives here:
#   harbor-admin-secret  -- Harbor's own "admin" superuser password,
#                            consumed by the vendored chart's
#                            existingSecretAdminPassword (values.yaml).
#
# it.206 CORRECTION: `harbor-dev-robot` (the dev-project push robot's
# credentials) used to be committed here too, on the assumption that
# Harbor's RobotCreate API honors a caller-supplied secret. Live
# testing + source reading (src/controller/robot/controller.go's
# Create(), goharbor/harbor-core:v2.14.4) DISPROVED that: the server
# always generates the secret itself and shows it exactly once, in the
# create response -- there is no way to pin it. Committing a Secret
# here that config/configure-harbor.sh's Job then overwrites with a
# CAPTURED value would be actively harmful: `make harbor-configure`
# re-applies this whole kustomization (`kustomize build | kubectl
# apply`) on every run, and a placeholder block here would silently
# clobber the real, working captured secret back to the placeholder on
# every single re-run/re-sync.
#
# So `harbor-dev-robot` is now a Job-managed OUTPUT, not a GitOps
# INPUT: config/configure-harbor.sh writes it directly (via its own
# ServiceAccount + Role, config/rbac.yaml) the first time it captures a
# real secret from Harbor, and leaves it alone on every subsequent run
# as long as it's present. See README.md's "Robot account and auth
# model" section for the full writeup.
apiVersion: v1
kind: Secret
metadata:
  name: harbor-admin-secret
  namespace: onedata-gitops-harbor
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  HARBOR_ADMIN_PASSWORD: demo-harbor-admin-password
