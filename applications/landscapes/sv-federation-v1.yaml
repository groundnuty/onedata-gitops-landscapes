# Root Application for the sv-federation landscape, version v1 -- the
# it.283/287 maintainer-ordered scenario-2 federation test: 1 Onezone +
# TWO per-role-decomposed, multi-node, Composed Oneproviders, one Space
# supported on BOTH, cross-provider rtransfer proof (write via A, read
# via B and reverse), and an Oneclient re-validating scenario 1 against
# a decomposed provider. v0.6.5's hardware debut; deploys into its own
# namespace (sv-federation), independent of and never touching any
# other landscape.
#
# Deploy sequence: (1) `make apply-crds` (already re-run this session
# to pick up managerNodes/growMode/ephemeralStorage* -- the vendored
# crds/ was stale, see the commit that bumped it), (2) onedata-dev-ca
# platform Application Synced/Ready (already true on k8s-one), (3)
# `make harbor-pull-secret NS=sv-federation`, (4) this Application.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sv-federation-v1
  namespace: onedata-gitops-argocd
  labels:
    app.kubernetes.io/part-of: onedata-gitops-landscapes
    landscape: sv-federation
    landscape-version: v1
spec:
  project: default
  source:
    repoURL: https://github.com/groundnuty/onedata-gitops-landscapes.git
    targetRevision: master
    path: landscapes/sv-federation/v1
  destination:
    server: https://kubernetes.default.svc
    namespace: sv-federation
  syncPolicy:
    # Deliberately NO automated.prune / automated.selfHeal -- same
    # explicit-sync-only safety call as every other landscape's first
    # version.
    syncOptions:
      - CreateNamespace=false # the landscape's own 00-namespace.yaml (wave -1) creates it
  ignoreDifferences:
    # See argocd/README.md for the full rationale (no SSA in the
    # operator -> jsonPointers form; the only operator-mutated
    # spec-level field across every kind is metadata.finalizers).
    - group: onedata.org
      kind: Onezone
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Oneprovider
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: StorageBackend
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Space
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Support
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: User
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Oneclient
      jsonPointers:
        - /status
        - /metadata/finalizers
