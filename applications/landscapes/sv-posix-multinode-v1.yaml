# Root Application for the sv-posix-multinode landscape, version v1.
# Applied individually (make deploy-landscape NAME=sv-posix-multinode
# VERSION=v1) -- there is deliberately no auto-discovery root Application
# scanning applications/landscapes/ for new entries; every landscape
# deploy is an explicit, reviewed act (it.176).
#
# GATED: do not apply this until (1) the mandatory deploy sequence's
# steps 1-3 have run against the target cluster (scope-cluster-manager,
# apply-crds, argocd-install) AND (2) groundnuty/onedata-operator:v0.6.0
# actually exists -- see landscapes/sv-posix-multinode/v1/README.md's
# "Image pin" section. This manifest is schema-valid and dry-run-clean
# today; it is NOT yet deployable.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sv-posix-multinode-v1
  namespace: onedata-gitops-argocd
  labels:
    app.kubernetes.io/part-of: onedata-gitops-landscapes
    landscape: sv-posix-multinode
    landscape-version: v1
spec:
  project: default
  source:
    repoURL: https://github.com/groundnuty/onedata-gitops-landscapes.git
    targetRevision: master
    path: landscapes/sv-posix-multinode/v1
  destination:
    server: https://kubernetes.default.svc
    namespace: sv-posix-multinode
  syncPolicy:
    # Deliberately NO automated.prune / automated.selfHeal for v1
    # (it.176 safety call): a landscape's first version syncs only when
    # explicitly told to (`argocd app sync` or the UI), never
    # auto-pruned. Revisit once this model has a few safe cycles behind
    # it.
    syncOptions:
      - CreateNamespace=false # the landscape's own 00-namespace.yaml (wave 0) creates it
  ignoreDifferences:
    # See argocd/README.md for the full rationale (no SSA in the
    # operator -> jsonPointers form, not managedFieldsManagers; the only
    # operator-mutated spec-level field across every kind is
    # metadata.finalizers).
    - group: onedata.org
      kind: Onezone
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Oneprovider
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: StorageBackend
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Space
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Support
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: User
      jsonPointers:
        - /status
        - /metadata/finalizers
