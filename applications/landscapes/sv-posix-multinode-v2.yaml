# Root Application for the sv-posix-multinode landscape, version v2 --
# the reproducible-from-git productionized successor to v1 (design
# it.196/203): dev-CA TLS + Harbor images + a v0.6.1 operator pin +
# NetworkPolicy-default-off. Deploys ALONGSIDE the running v1
# Application (sv-posix-multinode-v1.yaml), into its OWN destination
# namespace (sv-posix-multinode-v2) -- v1 is left completely
# undisturbed by this Application's existence or sync.
#
# GATED, same discipline as sv-posix-multinode-v1.yaml: do not apply
# until (1) `make apply-crds` has been re-run to pick up the
# spec.tls.trustIssuerCA field (crds/ was bumped alongside this
# manifest -- see crds/README.md's superset rule), (2) the
# onedata-dev-ca platform Application (applications/platform/
# onedata-dev-ca.yaml) is synced and its ClusterIssuer is Ready, (3)
# harbor.k8s-one-onedata.dedyn.io:30003/dev/onedata-operator:v0.6.1
# actually exists (see landscapes/sv-posix-multinode/v2/README.md's
# "Image pins" section), and (4) `make harbor-pull-secret
# NS=sv-posix-multinode-v2` has been run. This manifest is
# schema-valid and dry-run-clean today; it is NOT yet deployable.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sv-posix-multinode-v2
  namespace: onedata-gitops-argocd
  labels:
    app.kubernetes.io/part-of: onedata-gitops-landscapes
    landscape: sv-posix-multinode
    landscape-version: v2
spec:
  project: default
  source:
    repoURL: https://github.com/groundnuty/onedata-gitops-landscapes.git
    targetRevision: master
    path: landscapes/sv-posix-multinode/v2
  destination:
    server: https://kubernetes.default.svc
    namespace: sv-posix-multinode-v2
  syncPolicy:
    # Deliberately NO automated.prune / automated.selfHeal, same safety
    # call as v1: a landscape's first version syncs only when
    # explicitly told to.
    syncOptions:
      - CreateNamespace=false # the landscape's own 00-namespace.yaml (wave -1) creates it
  ignoreDifferences:
    # See argocd/README.md for the full rationale (no SSA in the
    # operator -> jsonPointers form; the only operator-mutated
    # spec-level field across every kind is metadata.finalizers).
    - group: onedata.org
      kind: Onezone
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Oneprovider
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: StorageBackend
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Space
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: Support
      jsonPointers:
        - /status
        - /metadata/finalizers
    - group: onedata.org
      kind: User
      jsonPointers:
        - /status
        - /metadata/finalizers
